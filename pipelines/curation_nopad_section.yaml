# StemForge Curation Engine v2 — NO-PAD + SECTION-MAIN-ALT variant.
#
# Same as curation_nopad.yaml except drums and bass use the
# `section-main-alt` strategy: detect the song's section structure (verse /
# chorus / bridge equivalents), and for each section TYPE select MAIN
# (the bar closest to the section's centroid in feature space — the most
# representative version) plus N ALTs (bars max-distant from MAIN within
# the same section — the section's variations).
#
# Output layout per stem (with default alts_per_section=2, max_sections=4):
#   section A: MAIN, ALT_1, ALT_2
#   section B: MAIN, ALT_1, ALT_2
#   section C: MAIN, ALT_1, ALT_2
#   ...up to loop_count total
#
# Better than max-diversity for tracks with clear repeated sections — you
# get the actual backbone of each section instead of 16 disparate variants
# scattered across the whole song.
#
# Usage:
#   uv run stemforge forge track.wav --backend demucs \
#     --curation pipelines/curation_nopad_section.yaml

version: 2

curation:
  trim_pad:
    default_bars: 0.0
    unit: bars
  warp_markers:
    enabled: true
    mode: auto
    auto_snap: transient
  loop:
    enabled: true
    loop_mode: none
  stems:
    drums:
      trim_pad: { bars: 0.0 }
      warp_markers: { auto_snap: transient }
      loop: { enabled: true, loop_mode: none }
    bass:
      trim_pad: { bars: 0.0 }
      warp_markers: { auto_snap: downbeat }
      loop: { enabled: true, loop_mode: none }
    vocals:
      trim_pad: { bars: 0.0 }
      warp_markers: { auto_snap: transient }
      loop: { enabled: true, loop_mode: none }
    other:
      trim_pad: { bars: 0.0 }
      warp_markers: { auto_snap: transient }
      loop: { enabled: true, loop_mode: none }

layout:
  mode: production
  pad_grid: 8x8
  quadrant_size: 4x4

stems:
  drums:
    phrase_bars: 4
    loop_count: 8
    oneshot_count: 8
    strategy: section-main-alt
    alts_per_section: 2
    max_sections: 3
    oneshot_mode: classify
    chromatic: false
    midi_extract: false
    rms_floor: 0.01
    crest_min: 4.0
    content_density_min: 0.15
    distance_weights:
      rhythm: 0.6
      spectral: 0.2
      energy: 0.2
    processing:
      - pipeline: default

  bass:
    phrase_bars: 4
    loop_count: 4
    oneshot_count: 0
    strategy: section-main-alt
    alts_per_section: 1     # 4 = 2 sections × (1 main + 1 alt)
    max_sections: 2
    oneshot_mode: diverse
    midi_extract: false     # disable melodic-mode dispatch so section-main-alt actually runs
    midi_quantize: "1/16"
    bottom_mode: melodic
    chromatic: true
    chromatic_root: auto
    rms_floor: 0.01
    crest_min: 2.0
    content_density_min: 0.3
    distance_weights:
      rhythm: 0.3
      spectral: 0.4
      energy: 0.3
    processing:
      - pipeline: default

  vocals:
    phrase_bars: 4
    loop_count: 12
    oneshot_count: 4
    strategy: sectional
    oneshot_mode: diverse
    midi_extract: false
    chromatic: false
    rms_floor: 0.02
    crest_min: 3.0
    content_density_min: 0.3
    distance_weights:
      rhythm: 0.2
      spectral: 0.5
      energy: 0.3
    processing:
      - pipeline: default

  other:
    phrase_bars: 2
    loop_count: 10
    oneshot_count: 6
    strategy: max-diversity
    oneshot_mode: diverse
    midi_extract: false
    chromatic: false
    rms_floor: 0.015
    crest_min: 2.0
    content_density_min: 0.2
    distance_weights:
      rhythm: 0.3
      spectral: 0.4
      energy: 0.3
    processing:
      - pipeline: default
      - pipeline: glitch

song:
  boundary_method: recurrence
  min_segment_bars: 4
  max_segments: 8
  prefer_transitions: true
  transition_window_bars: 2

dj:
  base_position: top_left
  subloop_axis: vertical
  oneshot_axis: horizontal
  subloop_divisions: [1, 0.5, 0.5, 0.25]
  fill_mode: combo

defaults:
  phrase_bars: 1
  loop_count: 8
  oneshot_count: 8
  strategy: max-diversity
  oneshot_mode: diverse
  chromatic: false
  midi_extract: false
  rms_floor: 0.01
  crest_min: 4.0
  content_density_min: 0.15
  distance_weights:
    rhythm: 0.5
    spectral: 0.25
    energy: 0.25

ep133_export:
  enabled: true
  sync:
    mode: midi_clock
    master: ableton
  defaults:
    play_mode: key
    loop: false
    mute_group: 0
    time_stretch:
      mode: bpm
      source_bpm: null
  stems:
    drums:
      play_mode: oneshot
      loop: true
      mute_group: 0
      time_stretch:
        mode: bar
        bars: 4
    bass:
      play_mode: oneshot
      loop: true
      mute_group: 1
      time_stretch:
        mode: bpm
        source_bpm: null
    vocals:
      play_mode: key
      loop: false
      mute_group: 2
      time_stretch:
        mode: bpm
        source_bpm: null
    other:
      play_mode: legato
      loop: false
      mute_group: 0
      time_stretch:
        mode: bpm
        source_bpm: null
  pad_map:
    drums:  { group: A, pad: 1 }
    bass:   { group: A, pad: 2 }
    vocals: { group: A, pad: 3 }
    other:  { group: A, pad: 4 }
