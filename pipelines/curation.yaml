# StemForge Curation Engine v2 — Per-stem curation config
#
# Controls how bars/phrases/one-shots are selected and laid out
# on the Launchpad / Push pad grid. Separate from pipeline effects
# (pipelines/default.yaml) — curation governs WHAT gets selected,
# pipelines govern HOW it sounds.
#
# Usage:
#   uv run python v0/src/stemforge_curate_bars.py \
#     --stems-dir ~/stemforge/processed/track \
#     --curation pipelines/curation.yaml --json-events

version: 2

# ── Curation Stage v2 Schema ─────────────────────────────────────────────
# Controls the per-item `clip`/`warp_markers`/`loop`/`offsets` blocks emitted
# into the curated manifest. See specs/stemforge-curation-v2-spec.md.
#
# v0 behaviour: pad_bars is always 0.0 in emitted manifest; padded_* == raw_*;
# warp_markers are stubs (start + end); offsets.committed=false.
curation:
  trim_pad:
    default_bars: 0.5         # v0: ignored (pad_bars forced to 0). v1: honoured.
    unit: bars                # "bars" | "beats" | "seconds"
  warp_markers:
    enabled: true
    mode: auto                # "auto" | "manual_only"
    auto_snap: transient      # "transient" | "downbeat" | "none"
  loop:
    enabled: true
    loop_mode: none           # "none" | "loop" | "ping_pong"
  stems:
    drums:
      trim_pad: { bars: 0.25 }
      warp_markers: { auto_snap: transient }
      loop: { enabled: true, loop_mode: none }
    bass:
      trim_pad: { bars: 0.5 }
      warp_markers: { auto_snap: downbeat }
      loop: { enabled: true, loop_mode: none }
    vocals:
      trim_pad: { bars: 1.0 }
      warp_markers: { auto_snap: transient }
      loop: { enabled: true, loop_mode: none }
    other:
      trim_pad: { bars: 0.5 }
      warp_markers: { auto_snap: transient }
      loop: { enabled: true, loop_mode: none }

# ── Layout Mode ──────────────────────────────────────────────────────────
# stems    = quadrant 8×8 (4 stems × 4×4 pads, Drum Racks)
# dj       = DJ single-deck (base + subloops + oneshots per quadrant)
# dual-deck = two Launchpad Pros, one song each
# session  = v0 compat (4 audio tracks × 16 clip slots)
# Active layout — switch between modes here
layout:
  mode: production          # production | loops-only | stems | dj | dual-deck | session
  pad_grid: 8x8
  quadrant_size: 4x4

# ── Per-Stem Curation ────────────────────────────────────────────────────
stems:
  drums:
    phrase_bars: 1            # single-bar chops
    loop_count: 8             # top 2 rows of quadrant
    oneshot_count: 8          # bottom 2 rows — classified drum hits
    strategy: max-diversity
    oneshot_mode: classify    # classify | diverse | loudest
    chromatic: false
    midi_extract: false
    rms_floor: 0.01
    crest_min: 4.0
    content_density_min: 0.15  # drums are punchy; even sparse bars have some active frames
    distance_weights:
      rhythm: 0.6
      spectral: 0.2
      energy: 0.2
    processing:
      - pipeline: default

  bass:
    phrase_bars: 1            # single bars — 2-bar phrases had too many half-silent second bars
    loop_count: 4
    oneshot_count: 0          # bottom 12 pads used for chromatic/scale/MIDI
    strategy: max-diversity
    oneshot_mode: diverse
    midi_extract: true        # pitch detection → Sampler + MIDI clips
    midi_quantize: "1/16"
    bottom_mode: melodic      # melodic (12 chromatic + 4 loops) | scale (8 in-key + 8 loops) | reconstruct (4 chrom + 4 MIDI + 8 loops)
    chromatic: true
    chromatic_root: auto      # auto-detect from pyin, or specify e.g. "C2"
    rms_floor: 0.01
    crest_min: 2.0
    content_density_min: 0.3  # bass is naturally sparse — but reject >70% silence
    distance_weights:
      rhythm: 0.3
      spectral: 0.4
      energy: 0.3
    processing:
      - pipeline: default

  vocals:
    phrase_bars: 4            # 4-bar melodic phrases
    loop_count: 12
    oneshot_count: 4          # vocal stabs, ad-libs
    strategy: sectional       # prefer structurally significant sections
    oneshot_mode: diverse
    midi_extract: false
    chromatic: false
    rms_floor: 0.02
    crest_min: 3.0
    content_density_min: 0.3   # vocals must fill at least 30% of frames — reject instrumental sections
    distance_weights:
      rhythm: 0.2
      spectral: 0.5
      energy: 0.3
    processing:
      - pipeline: default

  other:
    phrase_bars: 2
    loop_count: 10
    oneshot_count: 6
    strategy: max-diversity
    oneshot_mode: diverse
    midi_extract: false
    chromatic: false
    rms_floor: 0.015
    crest_min: 2.0
    content_density_min: 0.2   # reject bars that are mostly ambient noise
    distance_weights:
      rhythm: 0.3
      spectral: 0.4
      energy: 0.3
    processing:
      - pipeline: default
      - pipeline: glitch

# ── Song Structure Detection ─────────────────────────────────────────────
song:
  boundary_method: recurrence   # recurrence | novelty
  min_segment_bars: 4
  max_segments: 8
  prefer_transitions: true
  transition_window_bars: 2

# ── DJ Layout Overrides ──────────────────────────────────────────────────
dj:
  base_position: top_left
  subloop_axis: vertical
  oneshot_axis: horizontal
  subloop_divisions: [1, 0.5, 0.5, 0.25]
  fill_mode: combo              # combo | empty | subloop_only

# ── Defaults (inherited by any stem not listed above) ────────────────────
defaults:
  phrase_bars: 1
  loop_count: 8
  oneshot_count: 8
  strategy: max-diversity
  oneshot_mode: diverse
  chromatic: false
  midi_extract: false
  rms_floor: 0.01
  crest_min: 4.0
  content_density_min: 0.15
  distance_weights:
    rhythm: 0.5
    spectral: 0.25
    energy: 0.25

# ── EP-133 Export (Hardware sampler target) ─────────────────────────────
# Drives `stemforge export --target ep133 --manifest ... --config <this>`.
# See specs/stemforge-ep133-export-spec.md.
ep133_export:
  enabled: true

  sync:
    mode: midi_clock              # "midi_clock" | "sync24" | "usb_midi"
    master: ableton               # Ableton sends clock; EP-133 receives
    # On-device: SHIFT+ERASE → System Settings → MIDI → Clock → On

  defaults:
    play_mode: key                # "oneshot" | "key" | "legato"
    loop: false
    mute_group: 0                 # 0 = no choke; 1–8 = group id
    time_stretch:
      mode: bpm                   # "bpm" | "bar" | "none"
      source_bpm: null            # null = read from manifest bpm

  stems:
    drums:
      play_mode: oneshot
      loop: true
      mute_group: 0
      time_stretch:
        mode: bar                 # drums: stretch to fit N bars exactly
        bars: 4
    bass:
      play_mode: oneshot
      loop: true
      mute_group: 1
      time_stretch:
        mode: bpm
        source_bpm: null
    vocals:
      play_mode: key              # gated: plays while held
      loop: false
      mute_group: 2
      time_stretch:
        mode: bpm
        source_bpm: null
    other:
      play_mode: legato           # mono, continues on retrigger
      loop: false
      mute_group: 0
      time_stretch:
        mode: bpm
        source_bpm: null

  # Starting pad-map. In v0 each of the 16 loops per stem becomes its own file;
  # the user assigns them to pads in EP Sample Tool following SETUP.md. v1 may
  # model per-loop pad assignments.
  pad_map:
    drums:  { group: A, pad: 1 }
    bass:   { group: A, pad: 2 }
    vocals: { group: A, pad: 3 }
    other:  { group: A, pad: 4 }
