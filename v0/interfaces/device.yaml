# StemForge v0 — M4L device UI + binary-resolution contract.
#
# Layout v2 (v8ui matrix architecture):
#   - 820×169 fixed M4L canvas.
#   - Top 820×149 is a single [v8ui sf_ui.js] canvas (left/middle/right columns).
#   - Bottom 20px is native status: status dot + status text + version text.
#   - All UI drawing + click dispatch happens inside sf_ui.js. The patcher
#     routes sf_ui's outlet-0 events to popup umenus and the sf_forge/sf_state
#     JS modules. See specs/stemforge_device_ui_contract.md for the full spec.

version: 2

device:
  name: "StemForge"
  short_name: "SF"
  bundle_identifier: "com.stemforge.m4l.v0"
  version: "0.1.0"

# UI — 820×169px (M4L 169 is fixed; 820 is the spec canvas).
ui:
  size: { width: 820, height: 169 }

  # Visual body is drawn by v8ui; native objects live only in the 20px footer.
  v8ui:
    id: sf_ui
    filename: sf_ui.js
    pos: { x: 0, y: 0 }
    size: { width: 820, height: 149 }

  status_bar:
    y: 152
    height: 14

    status_dot:
      id: sf_status_dot
      pos: { x: 8, y: 152 }
      size: { width: 12, height: 12 }

    status_text:
      id: sf_status_text
      pos: { x: 24, y: 152 }
      size: { width: 600, height: 14 }

    version_text:
      id: sf_version_text
      pos: { x: 720, y: 152 }
      size: { width: 90, height: 14 }

# JS modules to instantiate as classic [js] boxes in the patcher.
# v8ui is handled separately. Order here is arbitrary (visual only).
js_modules:
  - filename: sf_state.js
    scripting_name: sf_state_mgr
    numoutlets: 2
  - filename: sf_forge.js
    scripting_name: sf_forge_mgr
    numoutlets: 3
  - filename: sf_preset_loader.js
    scripting_name: sf_preset_loader
    numoutlets: 2
  - filename: sf_manifest_loader.js
    scripting_name: sf_manifest_loader
    numoutlets: 2
  - filename: sf_settings.js
    scripting_name: sf_settings_mgr
    numoutlets: 2
  - filename: sf_logger.js
    scripting_name: sf_logger
    numoutlets: 0
  - filename: stemforge_ndjson_parser.v0.js
    scripting_name: sf_ndjson_parser
    numoutlets: 1
  - filename: stemforge_loader.v0.js
    scripting_name: sf_lom_loader
    numoutlets: 3
  - filename: sf_clip_export.js
    scripting_name: sf_clip_export
    numoutlets: 2

# How the M4L device finds the native binary at runtime.
binary:
  executable_name: stemforge-native
  search_paths:
    - "$AMXD_DIR/../bin/stemforge-native"
    - "~/Library/Application Support/StemForge/bin/stemforge-native"
    - "/usr/local/bin/stemforge-native"
    - "/opt/homebrew/bin/stemforge-native"
  protocol: ndjson-stdio
  schema: "v0/interfaces/ndjson.schema.json"

# Arguments passed to the binary.
invocation:
  subcommand: forge
  flags:
    "--json-events": true
    "--pipeline": "$pipeline"
    "--backend": "$backend"
    "--output": "~/stemforge/processed"

# Runtime behavior after completion.
post_complete:
  read_manifest: "~/stemforge/processed/$track/stems.json"
  actions:
    - set_tempo_from_manifest
    - duplicate_template_tracks
    - load_clips_into_tracks
    - load_beat_slices_into_simpler

# Where files live on disk (must match installer layout).
paths:
  inbox:             "~/stemforge/inbox"
  processed:         "~/stemforge/processed"
  logs:              "~/stemforge/logs"
  support:           "~/Library/Application Support/StemForge"
  models:            "~/Library/Application Support/StemForge/models"
  ableton_user_lib:  "~/Music/Ableton/User Library"
  amxd_install:      "$ableton_user_lib/Presets/Audio Effects/Max Audio Effect/StemForge.amxd"
  als_install:       "$ableton_user_lib/Templates/StemForge.als"
