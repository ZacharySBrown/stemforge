"SoundToys.Crystallizer":
  uid: "536e64545f4372797374616c69725f00"  # PLACEHOLDER
  vendor: "Soundtoys"
  name: "Crystallizer"
  params:
    splice:
      # Tempo subdivision for splice length.
      id: 0
      range: [0, 30]
      enum:
        "1/32": 1
        "1/16": 2
        "1/8": 5
        "1/4": 9
    shift:
      # Pitch shift in semitones, range -24..+24 mapped to normalized 0..1.
      # The string form "+5 semitones" is parsed by builder and mapped.
      id: 1
      range: [-24, 24]
    mix:
      id: 2
      range: [0.0, 1.0]

