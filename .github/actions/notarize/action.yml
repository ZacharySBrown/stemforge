name: Codesign + Notarize
description: >
  Imports a Developer ID certificate into a temporary keychain, signs the
  artifact (binary or .pkg), submits to Apple notarytool, and staples the
  notarization ticket. Cleans up the keychain on exit.

inputs:
  artifact:
    description: Path to the file to sign (Mach-O binary or .pkg).
    required: true
  kind:
    description: '"binary" (default) or "installer". Controls codesign vs productsign.'
    required: false
    default: binary
  entitlements:
    description: Path to entitlements.plist (binary kind only).
    required: false
    default: ''
  codesign-id:
    description: 'Common Name of the signing identity (e.g. Developer ID Application: ...).'
    required: true
  codesign-cert-p12-b64:
    description: Base64-encoded .p12 certificate bundle.
    required: true
  codesign-cert-pw:
    description: Password for the .p12 bundle.
    required: true
  apple-id:
    description: Apple ID used for notarytool submissions.
    required: true
  apple-team-id:
    description: Apple developer team ID.
    required: true
  apple-app-pw:
    description: App-specific password for notarytool.
    required: true

runs:
  using: composite
  steps:
    - name: Import signing cert into temp keychain
      shell: bash
      env:
        CERT_P12_B64: ${{ inputs.codesign-cert-p12-b64 }}
        CERT_PW: ${{ inputs.codesign-cert-pw }}
      run: |
        set -euo pipefail
        KEYCHAIN="$RUNNER_TEMP/stemforge-signing.keychain-db"
        KEYCHAIN_PW="$(uuidgen)"
        echo "STEMFORGE_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

        security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
        security set-keychain-settings -lut 3600 "$KEYCHAIN"
        security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"

        CERT_PATH="$RUNNER_TEMP/cert.p12"
        echo "$CERT_P12_B64" | base64 --decode > "$CERT_PATH"

        security import "$CERT_PATH" \
          -k "$KEYCHAIN" \
          -P "$CERT_PW" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign \
          -T /usr/bin/security

        security set-key-partition-list \
          -S apple-tool:,apple:,codesign:,productsign: \
          -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

        # Put temp keychain first on the search list so codesign finds the identity.
        security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

        rm -f "$CERT_PATH"

    - name: Sign artifact
      shell: bash
      env:
        ARTIFACT: ${{ inputs.artifact }}
        KIND: ${{ inputs.kind }}
        SIGN_ID: ${{ inputs.codesign-id }}
        ENTITLEMENTS: ${{ inputs.entitlements }}
      run: |
        set -euo pipefail
        if [ "$KIND" = "installer" ]; then
          # .pkg signing uses productsign.
          SIGNED="${ARTIFACT%.pkg}-signed.pkg"
          productsign --sign "$SIGN_ID" --keychain "$STEMFORGE_KEYCHAIN" "$ARTIFACT" "$SIGNED"
          mv "$SIGNED" "$ARTIFACT"
        else
          args=(--force --options runtime --timestamp --sign "$SIGN_ID")
          if [ -n "$ENTITLEMENTS" ] && [ -f "$ENTITLEMENTS" ]; then
            args+=(--entitlements "$ENTITLEMENTS")
          fi
          codesign "${args[@]}" "$ARTIFACT"
          codesign -dvv "$ARTIFACT"
        fi

    - name: Submit to notarytool
      shell: bash
      env:
        ARTIFACT: ${{ inputs.artifact }}
        KIND: ${{ inputs.kind }}
        APPLE_ID: ${{ inputs.apple-id }}
        TEAM_ID: ${{ inputs.apple-team-id }}
        APP_PW: ${{ inputs.apple-app-pw }}
      run: |
        set -euo pipefail
        if [ "$KIND" = "installer" ]; then
          SUBMIT="$ARTIFACT"
        else
          SUBMIT="$RUNNER_TEMP/$(basename "$ARTIFACT").zip"
          ditto -c -k --keepParent "$ARTIFACT" "$SUBMIT"
        fi

        xcrun notarytool submit "$SUBMIT" \
          --apple-id "$APPLE_ID" \
          --team-id "$TEAM_ID" \
          --password "$APP_PW" \
          --wait

    - name: Staple ticket
      shell: bash
      env:
        ARTIFACT: ${{ inputs.artifact }}
      run: |
        set -euo pipefail
        xcrun stapler staple "$ARTIFACT"
        xcrun stapler validate "$ARTIFACT"

    - name: Clean up keychain
      if: always()
      shell: bash
      run: |
        if [ -n "${STEMFORGE_KEYCHAIN:-}" ] && [ -f "$STEMFORGE_KEYCHAIN" ]; then
          security delete-keychain "$STEMFORGE_KEYCHAIN" || true
        fi
